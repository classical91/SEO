[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @rankforge/web railway:build"
watchPatterns = [
  "/apps/web/**",
  "/packages/ai/**",
  "/packages/crawler/**",
  "/packages/db/**",
  "/packages/integrations/**",
  "/packages/seo/**",
  "/packages/ui/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/scripts/**",
  "/tsconfig.base.json",
  "/turbo.json",
  "/.npmrc"
]

[deploy]
preDeployCommand = "pnpm --filter @rankforge/web railway:predeploy"
startCommand = "pnpm --filter @rankforge/web start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
