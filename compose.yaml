services:
  postgres:
    image: postgres:16-alpine
    container_name: rankforge-postgres
    environment:
      POSTGRES_DB: rankforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rankforge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rankforge"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: rankforge-redis
    ports:
      - "6379:6379"
    volumes:
      - rankforge-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  rankforge-postgres-data:
  rankforge-redis-data:
